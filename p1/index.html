<!DOCTYPE html>
<html>
<head>
    <title>CRUD Operations</title>
</head>
<body>

<script>
    // Create
    let students = [];

    students.push("Sriram");
    students.push("Rahul");
    students.push("Priya");

    console.log("After Create:");
    console.log(students);

    // Read
    console.log("Read:");
    students.forEach((student, index) => {
        console.log(index + ": " + student);
    });

    // Update
    students[1] = "Rohit";

    console.log("After Update:");
    console.log(students);

    // Delete
    students.splice(2, 1);

    console.log("After Delete:");
    console.log(students);
</script>

</body>
</html>
